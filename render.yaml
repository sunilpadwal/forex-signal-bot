services:
  - type: web
    name: forex-signal-bot
    runtime: python

    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

      - key: BOT_TOKEN
        sync: false

      - key: QUOTEX_EMAIL
        sync: false

      - key: QUOTEX_PASSWORD
        sync: false

    aptPackages:
      - google-chrome-stable
      - wget
      - curl
      - unzip
      - gnupg